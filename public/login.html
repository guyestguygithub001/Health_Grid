<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health Grid | Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #060d1f;
      --card: rgba(17,27,50,0.85);
      --border: rgba(99,179,237,0.12);
      --brand: #3b82f6;
      --brand-glow: rgba(59,130,246,0.35);
      --success: #10b981;
      --danger: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --muted-light: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated Background */
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.25;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: #1d4ed8; top: -150px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: #7c3aed; bottom: -100px; right: -80px; animation-delay: -3s; }
    .orb-3 { width: 300px; height: 300px; background: #0891b2; top: 40%; right: 20%; animation-delay: -5s; }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Grid lines overlay */
    .grid-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(99,179,237,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,179,237,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Login Card */
    .login-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 440px;
      padding: 20px;
    }

    .logo-section {
      text-align: center; margin-bottom: 36px;
    }
    .logo-mark {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      border-radius: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 32px; margin-bottom: 16px;
      box-shadow: 0 0 40px var(--brand-glow);
      animation: pulse-logo 3s ease-in-out infinite;
    }
    @keyframes pulse-logo {
      0%, 100% { box-shadow: 0 0 40px var(--brand-glow); }
      50% { box-shadow: 0 0 70px rgba(59,130,246,0.5), 0 0 120px rgba(124,58,237,0.2); }
    }
    .logo-section h1 {
      font-size: 26px; font-weight: 800;
      background: linear-gradient(135deg, #93c5fd, #c4b5fd);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .logo-section p { font-size: 13px; color: var(--muted-light); }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }
    .card h2 {
      font-size: 20px; font-weight: 700; margin-bottom: 6px;
    }
    .card .sub {
      font-size: 13px; color: var(--muted-light); margin-bottom: 28px;
    }

    .form-group { margin-bottom: 18px; }
    label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--muted-light); margin-bottom: 7px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 16px; pointer-events: none; opacity: 0.5;
    }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 13px 14px 13px 42px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: var(--text);
      font-family: inherit; font-size: 14px;
      transition: all 0.25s;
      outline: none;
    }
    input:focus {
      border-color: var(--brand);
      background: rgba(59,130,246,0.06);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .role-select {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 18px;
    }
    .role-btn {
      padding: 10px 8px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: var(--muted-light); font-size: 11px;
      font-weight: 600; cursor: pointer;
      transition: all 0.2s; text-align: center;
      font-family: inherit;
    }
    .role-btn:hover { border-color: var(--brand); color: var(--text); }
    .role-btn.selected {
      border-color: var(--brand);
      background: rgba(59,130,246,0.12);
      color: #93c5fd;
    }

    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border: none; border-radius: 10px;
      color: white; font-size: 15px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      transition: all 0.25s;
      position: relative; overflow: hidden;
      margin-top: 4px;
    }
    .btn-login::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59,130,246,0.4); }
    .btn-login:hover::before { opacity: 1; }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none; padding: 12px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px; color: #fca5a5;
      font-size: 13px; margin-top: 14px;
      animation: shake 0.4s ease;
    }
    .error-msg.show { display: block; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .hint {
      margin-top: 24px; padding: 14px;
      background: rgba(59,130,246,0.06);
      border: 1px solid rgba(59,130,246,0.12);
      border-radius: 8px;
    }
    .hint p { font-size: 12px; color: var(--muted-light); line-height: 1.5; }
    .hint strong { color: #93c5fd; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--muted); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.07);
    }

    .portal-link {
      display: block; text-align: center;
      color: var(--brand); font-size: 13px; font-weight: 600;
      text-decoration: none; padding: 10px;
      border-radius: 8px; border: 1px solid rgba(59,130,246,0.2);
      background: rgba(59,130,246,0.05);
      transition: all 0.2s;
    }
    .portal-link:hover { background: rgba(59,130,246,0.12); border-color: var(--brand); }

    .status-bar {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 20px; z-index: 100;
    }
    .status-pill {
      padding: 6px 14px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.2);
      color: #6ee7b7;
      display: flex; align-items: center; gap: 6px;
    }
    .status-dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="grid-overlay"></div>

  <div class="login-wrap">
    <div class="logo-section">
      <div class="logo-mark">🏥</div>
      <h1>Health Grid</h1>
    </div>

    <div class="card">
      <h2>Staff Sign In</h2>
      <p class="sub">Access your clinical workspace</p>

      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username" />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
        </div>
      </div>

      <div class="form-group" style="margin: 16px auto 20px; text-align: center; display: flex; align-items: center; justify-content: center; width: 100%;">
        <label for="agreeLegalConsent" style="font-size: 11px; text-transform: none; letter-spacing: normal; color: var(--muted-light); cursor: pointer; font-weight: 400; display: inline-flex; align-items: center; justify-content: center; gap: 8px; margin: 0 auto; text-align: center;">
          <input type="checkbox" id="agreeLegalConsent" style="margin: 0; cursor: pointer; flex-shrink: 0;" required />
          <span>I agree to <a href="legal.html#tos" target="_blank" style="color:var(--brand); text-decoration:none; font-weight:600;">Terms</a> · <a href="legal.html#privacy" target="_blank" style="color:var(--brand); text-decoration:none; font-weight:600;">Privacy</a> · <a href="legal.html#disclaimer" target="_blank" style="color:var(--brand); text-decoration:none; font-weight:600;">Disclaimer</a> <span style="opacity:0.65;">(18+)</span></span>
        </label>
      </div>

      <button class="btn-login" id="loginBtn" onclick="doLogin()">
        Sign In to Dashboard
      </button>

      <div class="error-msg" id="errorMsg"></div>

      <div class="divider">or</div>
      <a href="/portal.html" class="portal-link">👤 Patient Self-Service Portal</a>

      <div class="hint" style="margin-top:18px;">
        <p>Staff credentials: <strong>guyestguy</strong> / <strong>guyestguygithub001</strong><br />
        Patients use the self-service portal to register and access their records.</p>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-pill"><span class="status-dot"></span> Server Online</div>
    <div class="status-pill" style="background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.2);color:#93c5fd;">🔗 FHIR R6</div>
    <div class="status-pill" style="background:rgba(139,92,246,0.12);border-color:rgba(139,92,246,0.2);color:#c4b5fd;">🎥 Telehealth</div>
  </div>

  <script>
    // Auto-redirect if already logged in
    const stored = sessionStorage.getItem("sc_auth");
    if (stored) {
      const auth = JSON.parse(stored);
      if (auth.token) window.location.href = "/admin.html";
    }

    document.getElementById("username").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("password").focus(); });
    document.getElementById("password").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

    async function doLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("loginBtn");
      const err = document.getElementById("errorMsg");

      const consent = document.getElementById("agreeLegalConsent");
      if (consent && !consent.checked) {
        showError("You must explicitly agree to the Terms of Service, Privacy Policy, and Medical Disclaimer before signing in.");
        return;
      }

      if (!username || !password) {
        showError("Please enter your username and password.");
        return;
      }

      btn.innerHTML = '<span class="spinner"></span> Signing in…';
      btn.disabled = true;
      err.classList.remove("show");

      try {
        const res = await fetch("/api/v1/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success && data.token) {
          sessionStorage.setItem("sc_auth", JSON.stringify({
            token: data.token,
            username: data.username,
            role: data.role,
            userId: data.userId
          }));
          btn.innerHTML = '✅ Access Granted — Redirecting…';
          btn.style.background = "linear-gradient(135deg, #059669, #0891b2)";
          setTimeout(() => { window.location.href = "/admin.html"; }, 700);
        } else {
          showError("Invalid credentials. Please check your username and password.");
          btn.innerHTML = "Sign In to Dashboard";
          btn.disabled = false;
        }
      } catch(e) {
        showError("Cannot reach the server. Please ensure the application is running.");
        btn.innerHTML = "Sign In to Dashboard";
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const err = document.getElementById("errorMsg");
      err.textContent = "⚠️ " + msg;
      err.classList.add("show");
    }
  </script>
</body>
</html>
